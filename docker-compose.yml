services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?Defina DATABASE_URL no Dokploy}
      AUTH_SECRET: ${AUTH_SECRET:?Defina AUTH_SECRET no Dokploy}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Defina ENCRYPTION_KEY no Dokploy}
      AUTH_TRUST_HOST: "true"
      DATA_DIR: /data
    expose:
      - "3000"
    volumes:
      - app_data:/data
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.services.sequorai.loadbalancer.server.port=3000"
      - "traefik.http.routers.sequorai-http.rule=Host(`sequorai.4growco.com`)"
      - "traefik.http.routers.sequorai-http.entrypoints=web"
      - "traefik.http.routers.sequorai-http.middlewares=sequorai-https-redirect"
      - "traefik.http.routers.sequorai-http.service=sequorai"
      - "traefik.http.middlewares.sequorai-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.sequorai-https.rule=Host(`sequorai.4growco.com`)"
      - "traefik.http.routers.sequorai-https.entrypoints=websecure"
      - "traefik.http.routers.sequorai-https.tls=true"
      - "traefik.http.routers.sequorai-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.sequorai-https.service=sequorai"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    stop_grace_period: 30s

volumes:
  app_data:

networks:
  # O banco gerenciado pelo Dokploy e o proxy Traefik são alcançados por esta
  # rede. Ela já existe em uma instalação padrão do Dokploy.
  dokploy-network:
    external: true
